<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wortsuche 4x4</title>

<style>
:root{
  --bg:#121213;
  --card:#1a1a1b;
  --tile:#3a3a3c;
  --text:#ffffff;
  --accent:#538d4e;
}

body.light{
  --bg:#f2f2f2;
  --card:#ffffff;
  --tile:#e0e0e0;
  --text:#111111;
  --accent:#2e7d32;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
text-align:center;
}

h1{margin:10px;}

#topbar{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:5px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:var(--tile);
color:var(--text);
font-size:14px;
}

#grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding:10px;
max-width:420px;
margin:auto;
}

.tile{
height:70px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
background:var(--tile);
border-radius:8px;
}

.tile.selected{
background:#b59f3b;
}

#timer{
margin:6px;
font-size:18px;
}

#overlay{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
}

#panel{
background:var(--card);
padding:20px;
border-radius:12px;
width:85%;
max-width:320px;
}

#panel button{
width:100%;
margin-top:10px;
background:var(--accent);
}
</style>
</head>

<body>

<h1>Wortsuche</h1>

<div id="topbar">
<button onclick="startNormal()">Normal</button>
<button onclick="startEndless()">Endlos</button>
<button onclick="toggleTheme()">Hell/Dunkel</button>
<button id="endBtn" style="display:none" onclick="endEndless()">Ende</button>
</div>

<div id="timer">Zeit: 0.0s</div>

<div id="grid"></div>

<div id="overlay">
<div id="panel">

<h2 id="resultTitle"></h2>

<div id="stats"></div>

<button onclick="restart()">Neue Runde</button>

</div>
</div>

<script>

/* ---------------- Wortdatenbank ---------------- */

const WORDS=[
"APFE","BROT","HAND","HAUS","KALT","WIND","WALD","BACH",
"REIS","REIF","KORN","TIER","MUND","MAUS","KIND","RAUM",
"FORM","TONS","BILD","SEIL","GOLD","SAND","BERG","STEG"
]

/* ---------------- Spielvariablen ---------------- */

let grid=[]
let selected=[]
let foundWords=[]

let startTime=0
let timerInterval

let mode="normal"

let highscore=localStorage.getItem("wortsucheHighscore")

/* ---------------- Start ---------------- */

function startNormal(){
mode="normal"
initGame()
}

function startEndless(){
mode="endless"
initGame()
document.getElementById("endBtn").style.display="inline-block"
}

function initGame(){

foundWords=[]
selected=[]

grid=randomLetters(16)

drawGrid()

startTimer()

}

/* ---------------- Grid ---------------- */

function randomLetters(n){

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ"

let arr=[]

for(let i=0;i<n;i++){
arr.push(letters[Math.floor(Math.random()*letters.length)])
}

return arr

}

function drawGrid(){

const g=document.getElementById("grid")
g.innerHTML=""

grid.forEach((l,i)=>{

let d=document.createElement("div")
d.className="tile"
d.innerText=l

d.onclick=()=>selectTile(d,i)

g.appendChild(d)

})

}

/* ---------------- Auswahl ---------------- */

function selectTile(el,index){

if(el.classList.contains("selected")){
el.classList.remove("selected")
selected=selected.filter(i=>i!==index)
return
}

if(selected.length<4){
el.classList.add("selected")
selected.push(index)
}

if(selected.length===4){
checkWord()
}

}

/* ---------------- Wortprüfung ---------------- */

function checkWord(){

let word=selected.map(i=>grid[i]).join("")

if(WORDS.includes(word)){

foundWords.push(word)

removeLetters()

}else{

document.querySelectorAll(".selected")
.forEach(t=>t.classList.remove("selected"))

}

selected=[]

}

/* ---------------- Buchstaben entfernen ---------------- */

function removeLetters(){

selected.sort((a,b)=>b-a)

selected.forEach(i=>grid.splice(i,1))

if(mode==="normal"){

if(grid.length===0){
winGame()
}else{
drawGrid()
}

}else{

let newLetters=randomLetters(4)

grid.push(...newLetters)

shuffle(grid)

drawGrid()

}

}

/* ---------------- Timer ---------------- */

function startTimer(){

clearInterval(timerInterval)

startTime=Date.now()

timerInterval=setInterval(()=>{

let t=(Date.now()-startTime)/1000
document.getElementById("timer").innerText="Zeit: "+t.toFixed(1)+"s"

},100)

}

/* ---------------- Win ---------------- */

function winGame(){

clearInterval(timerInterval)

let time=((Date.now()-startTime)/1000).toFixed(2)

if(!highscore || time<highscore){
localStorage.setItem("wortsucheHighscore",time)
highscore=time
}

showPanel("Gewonnen",
"Zeit: "+time+"s<br>"+
"Highscore: "+highscore+"s<br><br>"+
"Gefundene Wörter:<br>"+foundWords.join(", ")
)

}

/* ---------------- Endlos Ende ---------------- */

function endEndless(){

clearInterval(timerInterval)

let time=((Date.now()-startTime)/1000).toFixed(2)

showPanel("Endlos beendet",
"Zeit: "+time+"s<br>"+
"Wörter: "+foundWords.length+"<br><br>"+
foundWords.join(", ")
)

}

/* ---------------- Overlay ---------------- */

function showPanel(title,content){

document.getElementById("resultTitle").innerText=title
document.getElementById("stats").innerHTML=content
document.getElementById("overlay").style.display="flex"

}

/* ---------------- Utils ---------------- */

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
[a[i],a[j]]=[a[j],a[i]]
}
}

function toggleTheme(){
document.body.classList.toggle("light")
}

function restart(){
location.reload()
}

</script>

</body>
</html>
