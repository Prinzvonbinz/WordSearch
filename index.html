<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wortsuche 4x4 - College Style</title>
<style>
  body {
    font-family: 'Arial Black', sans-serif;
    background-color: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    position: relative;
  }
  h1 {
    margin-bottom: 10px;
    font-size: 36px;
    text-shadow: 2px 2px #0000ff;
  }
  #hintButton {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    user-select: none;
    color: #1e90ff;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    grid-gap: 10px;
    margin-top: 20px;
  }
  .cell {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    background: #222;
    border-radius: 12px;
    cursor: pointer;
    user-select: none;
    box-shadow: 0 4px #00008b;
    transition: 0.2s all;
  }
  .cell.selected {
    background-color: #1e90ff;
    color: #fff;
    transform: translateY(2px);
    box-shadow: 0 2px #00008b;
  }
  .cell.wrong {
    animation: blinkRed 0.3s ease 0s 2;
  }
  @keyframes blinkRed {
    0% { background-color: #ff0000; color: #fff; }
    50% { background-color: #222; color: #fff; }
    100% { background-color: #ff0000; color: #fff; }
  }
  #winPanel {
    display: none;
    margin-top: 30px;
    text-align: center;
  }
  button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background-color: #1e90ff;
    color: #fff;
  }
</style>
</head>
<body>
<h1>Wortsuche 4x4</h1>
<div id="hintButton" title="Tipp geben">💡</div>
<div id="grid"></div>

<div id="winPanel">
  <h2>Gewonnen!</h2>
  <p id="stats"></p>
  <p id="foundWords"></p>
  <p id="hintUsed"></p>
  <button onclick="startGame()">Neustarten</button>
</div>

<script>
const wordDatabase = ["HAUS", "HUND", "MAUS", "TIER", "BAUM", "AUTO", "GELD", "BROT"];
let grid = [];
let selected = [];
let foundWords = [];
let wordsToFind = [];
let startTime;
let highscore = null;
let hintsUsed = 0;
let hintIndex = 0;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startGame() {
  selected = [];
  foundWords = [];
  hintsUsed = 0;
  hintIndex = 0;
  document.getElementById('winPanel').style.display = 'none';
  
  wordsToFind = shuffle(wordDatabase).slice(0,4);
  const letters = wordsToFind.join('').split('');
  grid = shuffle(letters);
  
  startTime = Date.now();
  renderGrid();
}

function renderGrid() {
  const gridDiv = document.getElementById('grid');
  gridDiv.innerHTML = '';
  grid.forEach((letter, i) => {
    if (letter === '') return; // verschwundene Felder
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.textContent = letter;
    if (selected.includes(i)) cell.classList.add('selected');
    cell.onclick = () => selectLetter(i);
    gridDiv.appendChild(cell);
  });
}

function selectLetter(index) {
  if (selected.includes(index)) {
    selected = selected.filter(i => i !== index);
  } else {
    selected.push(index);
  }
  renderGrid();
  if (selected.length === 4) checkWord();
}

function checkWord() {
  const lettersSelected = selected.map(i => grid[i]);
  const wordFormed = lettersSelected.sort().join('');
  
  let found = false;
  for (const w of wordsToFind) {
    if (!foundWords.includes(w) && w.split('').sort().join('') === wordFormed) {
      foundWords.push(w);
      // alle gewählten Felder verschwinden
      selected.forEach(i => grid[i] = '');
      selected = [];
      renderGrid();
      checkWin();
      found = true;
      break;
    }
  }

  if (!found) {
    // nur die angeklickten 4 Buchstaben blinken rot
    const gridDivs = document.getElementById('grid').childNodes;
    selected.forEach(i => {
      for (let cell of gridDivs) {
        if (cell.textContent === grid[i]) {
          cell.classList.add('wrong');
        }
      }
    });
    setTimeout(() => {
      gridDivs.forEach(cell => cell.classList.remove('wrong'));
      selected = [];
      renderGrid();
    }, 600);
  }
}

function checkWin() {
  if (foundWords.length === 4) {
    const timeTaken = Math.floor((Date.now() - startTime) / 1000);
    if (highscore === null || timeTaken < highscore) highscore = timeTaken;
    document.getElementById('stats').textContent = `Zeit: ${timeTaken} Sekunden | Highscore: ${highscore} Sekunden`;
    document.getElementById('foundWords').textContent = `Gefundene Wörter: ${foundWords.join(', ')}`;
    document.getElementById('hintUsed').textContent = `Hinweise genutzt: ${hintsUsed} von 4`;
    document.getElementById('winPanel').style.display = 'block';
  }
}

// Hinweis-Funktion
document.getElementById('hintButton').onclick = () => {
  if (hintIndex >= wordsToFind.length) hintIndex = 0;
  // nur Wörter anzeigen die noch nicht gefunden wurden
  let hintWord = wordsToFind[hintIndex];
  while (foundWords.includes(hintWord)) {
    hintIndex++;
    if (hintIndex >= wordsToFind.length) hintIndex = 0;
    hintWord = wordsToFind[hintIndex];
  }
  alert(`Tipp: Ein Wort ist "${hintWord}"`);
  hintsUsed++;
  hintIndex++;
}

// Spiel sofort starten
startGame();
</script>
</body>
</html>
