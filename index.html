<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wortsuche</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
transition:0.3s;
}

.light{
background:#f3f5f9;
color:#111;
}

.dark{
background:#121417;
color:white;
}

.container{
width:360px;
height:640px;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:20px;
padding:20px;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(10px);
}

.dark .container{
background:#1e2126;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.primary{
background:#4f7cff;
color:white;
}

.secondary{
background:#ddd;
}

.dark .secondary{
background:#333;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(4,70px);
gap:10px;
}

.tile{
width:70px;
height:70px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
background:white;
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

.dark .tile{
background:#2c3138;
}

.selected{
background:#4f7cff;
color:white;
}

.hidden{
opacity:0;
pointer-events:none;
}

#game,
#win{
display:none;
flex-direction:column;
align-items:center;
gap:15px;
}

ul{
list-style:none;
}

</style>
</head>

<body class="light">

<div class="container">

<div id="menu">

<h2>Wortsuche</h2>

<button class="primary" onclick="startGame('normal')">Normal</button>
<button class="primary" onclick="startGame('endless')">Endlos</button>

<br><br>

<button class="secondary" onclick="toggleTheme()">Hell/Dunkel</button>

</div>

<div id="game">

<h3>Zeit: <span id="time">0</span>s</h3>

<div id="grid" class="grid"></div>

<button class="primary" onclick="checkWord()">Wort prüfen</button>
<button class="secondary" id="endBtn" onclick="endEndless()">Ende</button>

</div>

<div id="win">

<h2>Fertig!</h2>

<p>Zeit: <span id="finalTime"></span></p>
<p>Highscore: <span id="highscore"></span></p>

<p>Gefundene Wörter</p>
<ul id="wordList"></ul>

<button class="primary" onclick="location.reload()">Nochmal</button>

</div>

</div>

<script>

const WORDS=[
"HAUS","MAUS","BAUM","AUTO","MOND","WIND","HAND",
"KIND","SAND","STERN","WORT","BROT","BILD","STADT"
]

let mode
let grid=[]
let selected=[]
let found=[]
let startTime
let timer

function toggleTheme(){

document.body.classList.toggle("dark")
document.body.classList.toggle("light")

}

function startGame(m){

mode=m

document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="flex"

if(mode==="endless"){
document.getElementById("endBtn").style.display="block"
}else{
document.getElementById("endBtn").style.display="none"
}

startTime=Date.now()

timer=setInterval(()=>{
document.getElementById("time").innerText=
Math.floor((Date.now()-startTime)/1000)
},1000)

if(mode==="normal") generateNormal()
else generateEndless()

drawGrid()

}

function generateNormal(){

let words=[]

while(words.length<4){

let w=WORDS[Math.floor(Math.random()*WORDS.length)]

if(!words.includes(w)) words.push(w)

}

grid=[]

words.forEach(w=>{
grid.push(...w.split(""))
})

shuffle(grid)

}

function generateEndless(){

let w=WORDS[Math.floor(Math.random()*WORDS.length)]
grid=w.split("")
shuffle(grid)

}

function shuffle(a){

for(let i=a.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))
[a[i],a[j]]=[a[j],a[i]]

}

}

function drawGrid(){

const g=document.getElementById("grid")
g.innerHTML=""

grid.forEach((l,i)=>{

let d=document.createElement("div")

d.className="tile"
d.innerText=l

d.onclick=()=>select(i,d)

g.appendChild(d)

})

}

function select(i,el){

if(selected.length>=4)return

el.classList.add("selected")

selected.push({i,el})

}

function checkWord(){

if(selected.length!==4) return

let word=selected.map(x=>grid[x.i]).join("")

if(WORDS.includes(word)){

found.push(word)

selected.forEach(s=>{
s.el.classList.add("hidden")
grid[s.i]=""
})

grid=grid.filter(x=>x!="")

if(mode==="endless"){

let w=WORDS[Math.floor(Math.random()*WORDS.length)]

grid.push(...w.split(""))
shuffle(grid)

}

drawGrid()

if(mode==="normal" && grid.length===0){

win()

}

}

selected.forEach(s=>s.el.classList.remove("selected"))
selected=[]

}

function win(){

clearInterval(timer)

document.getElementById("game").style.display="none"
document.getElementById("win").style.display="flex"

let time=Math.floor((Date.now()-startTime)/1000)

document.getElementById("finalTime").innerText=time+"s"

let hs=localStorage.getItem("wortHigh")

if(!hs || time<hs){

localStorage.setItem("wortHigh",time)
hs=time

}

document.getElementById("highscore").innerText=hs+"s"

const ul=document.getElementById("wordList")

found.forEach(w=>{
let li=document.createElement("li")
li.innerText=w
ul.appendChild(li)
})

}

function endEndless(){

win()

}

</script>

</body>
</html>
