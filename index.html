<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wortsuche</title>

<style>

:root{
--bg:#121213;
--tile:#3a3a3c;
--text:white;
--accent:#538d4e;
}

body.light{
--bg:#f2f2f2;
--tile:#dddddd;
--text:#111;
--accent:#2e7d32;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
text-align:center;
}

/* Menü */

#menu{
margin-top:60px;
}

button{
padding:12px 18px;
margin:8px;
border:none;
border-radius:8px;
background:var(--tile);
color:var(--text);
font-size:16px;
}

/* Grid */

#grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
max-width:420px;
margin:auto;
padding:10px;
}

.tile{
height:70px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
background:var(--tile);
border-radius:8px;
}

.tile.selected{
background:#b59f3b;
}

#timer{
margin:10px;
font-size:18px;
}

/* Overlay */

#overlay{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
}

#panel{
background:#1a1a1b;
padding:20px;
border-radius:10px;
width:80%;
max-width:320px;
}

#panel button{
width:100%;
margin-top:10px;
background:var(--accent);
}

</style>
</head>

<body>

<h1>Wortsuche</h1>

<div id="menu">

<button onclick="startNormal()">Normal</button>
<button onclick="startEndless()">Endlos</button>
<button onclick="toggleTheme()">Hell/Dunkel</button>

</div>

<div id="timer"></div>

<div id="grid"></div>

<button id="endBtn" style="display:none" onclick="endEndless()">Ende</button>

<div id="overlay">
<div id="panel">

<h2 id="resultTitle"></h2>
<div id="stats"></div>

<button onclick="restart()">Neue Runde</button>

</div>
</div>

<script>

/* Wortdatenbank */

const WORDS=[
"HAUS","HAND","MAUS","WIND",
"WALD","KALT","BROT","BACH",
"REIS","RAUM","FORM","SEIL",
"BILD","GOLD","SAND","BERG"
]

let grid=[]
let selected=[]
let foundWords=[]
let hiddenWords=[]

let startTime
let timerInterval

let mode="normal"

let highscore=localStorage.getItem("wortHigh")

/* Start Normal */

function startNormal(){

mode="normal"

document.getElementById("menu").style.display="none"

hiddenWords=[...WORDS].sort(()=>Math.random()-0.5).slice(0,4)

grid=[]

hiddenWords.forEach(w=>{
w.split("").forEach(l=>grid.push(l))
})

shuffle(grid)

drawGrid()

startTimer()

}

/* Start Endlos */

function startEndless(){

mode="endless"

document.getElementById("menu").style.display="none"
document.getElementById("endBtn").style.display="inline-block"

grid=randomLetters(16)

drawGrid()

startTimer()

}

/* Grid */

function drawGrid(){

const g=document.getElementById("grid")
g.innerHTML=""

grid.forEach((l,i)=>{

let d=document.createElement("div")
d.className="tile"
d.innerText=l

d.onclick=()=>selectTile(d,i)

g.appendChild(d)

})

}

/* Auswahl */

function selectTile(el,index){

if(el.classList.contains("selected")){

el.classList.remove("selected")
selected=selected.filter(i=>i!==index)
return

}

if(selected.length<4){

el.classList.add("selected")
selected.push(index)

}

if(selected.length===4){

checkWord()

}

}

/* Wortprüfung */

function checkWord(){

let word=selected.map(i=>grid[i]).join("")

if(WORDS.includes(word)){

foundWords.push(word)

removeLetters()

}else{

document.querySelectorAll(".selected")
.forEach(t=>t.classList.remove("selected"))

}

selected=[]

}

/* Entfernen */

function removeLetters(){

selected.sort((a,b)=>b-a)

selected.forEach(i=>grid.splice(i,1))

if(mode==="normal"){

if(grid.length===0){

winGame()

}else{

drawGrid()

}

}else{

grid.push(...randomLetters(4))

shuffle(grid)

drawGrid()

}

}

/* Timer */

function startTimer(){

startTime=Date.now()

timerInterval=setInterval(()=>{

let t=(Date.now()-startTime)/1000
document.getElementById("timer").innerText="Zeit: "+t.toFixed(1)+"s"

},100)

}

/* Win */

function winGame(){

clearInterval(timerInterval)

let time=((Date.now()-startTime)/1000).toFixed(2)

if(!highscore || time<highscore){

localStorage.setItem("wortHigh",time)
highscore=time

}

showPanel("Gewonnen",
"Zeit: "+time+"s<br>"+
"Highscore: "+highscore+"s<br><br>"+
hiddenWords.join(", ")
)

}

/* Endlos Ende */

function endEndless(){

clearInterval(timerInterval)

let time=((Date.now()-startTime)/1000).toFixed(2)

showPanel("Endlos beendet",
"Zeit: "+time+"s<br>"+
"Wörter: "+foundWords.length+"<br><br>"+
foundWords.join(", ")
)

}

/* Panel */

function showPanel(title,text){

document.getElementById("resultTitle").innerText=title
document.getElementById("stats").innerHTML=text
document.getElementById("overlay").style.display="flex"

}

/* Utils */

function randomLetters(n){

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ"
let arr=[]

for(let i=0;i<n;i++){
arr.push(letters[Math.floor(Math.random()*letters.length)])
}

return arr

}

function shuffle(a){

for(let i=a.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))
[a[i],a[j]]=[a[j],a[i]]

}

}

function toggleTheme(){

document.body.classList.toggle("light")

}

function restart(){

location.reload()

}

</script>

</body>
</html>
