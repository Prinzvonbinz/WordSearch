<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wortsuche Spiel</title>

<style>

body{
font-family:Arial;
text-align:center;
transition:0.3s;
}

.dark{
background:#111;
color:white;
}

.light{
background:#f2f2f2;
color:black;
}

button{
padding:10px 18px;
margin:5px;
font-size:16px;
cursor:pointer;
}

#grid{
display:grid;
grid-template-columns:repeat(4,70px);
gap:10px;
justify-content:center;
margin-top:20px;
}

.tile{
width:70px;
height:70px;
font-size:30px;
font-weight:bold;
border-radius:10px;
border:2px solid #888;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
background:white;
}

.dark .tile{
background:#222;
}

.selected{
background:#4caf50!important;
color:white;
}

.hidden{
visibility:hidden;
}

#game{
display:none;
}

#win{
display:none;
margin-top:30px;
}

</style>
</head>

<body class="light">

<h1>Wortsuche</h1>

<div id="menu">

<button onclick="startGame('normal')">Normal Modus</button>
<button onclick="startGame('endless')">Endlos Modus</button>

<br><br>

<button onclick="toggleTheme()">Hell/Dunkel</button>

</div>

<div id="game">

<h3>Zeit: <span id="time">0</span>s</h3>

<div id="grid"></div>

<br>

<button onclick="checkWord()">Wort prüfen</button>

<button id="endBtn" onclick="endEndless()" style="display:none">Ende</button>

</div>

<div id="win">

<h2>Gewonnen!</h2>

<p>Zeit: <span id="finalTime"></span></p>

<p>Highscore: <span id="highscore"></span></p>

<p>Gefundene Wörter:</p>

<ul id="words"></ul>

<button onclick="location.reload()">Nochmal spielen</button>

</div>

<script>

const WORDS = [
"HAUS","MAUS","BAUM","AUTO","WIND","HAND","KIND","MOND",
"SAND","STERN","WORT","BROT","BILD","STADT"
];

let mode=""
let grid=[]
let selected=[]
let foundWords=[]
let startTime
let timerInterval
let targetWords=[]

function toggleTheme(){

document.body.classList.toggle("dark")
document.body.classList.toggle("light")

}

function startGame(m){

mode=m

document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="block"

if(mode==="endless"){
document.getElementById("endBtn").style.display="inline-block"
}

startTime=Date.now()

timerInterval=setInterval(()=>{
document.getElementById("time").innerText=
Math.floor((Date.now()-startTime)/1000)
},1000)

if(mode==="normal"){

targetWords=[]
while(targetWords.length<4){

let w=WORDS[Math.floor(Math.random()*WORDS.length)]

if(!targetWords.includes(w)) targetWords.push(w)

}

let letters=[]
targetWords.forEach(w=>{
letters.push(...w.split(""))
})

shuffle(letters)
grid=letters

}else{

let w=randomWord()
grid=w.split("")
}

drawGrid()

}

function randomWord(){

return WORDS[Math.floor(Math.random()*WORDS.length)]

}

function shuffle(a){

for(let i=a.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))
[a[i],a[j]]=[a[j],a[i]]

}

}

function drawGrid(){

const g=document.getElementById("grid")
g.innerHTML=""

grid.forEach((l,i)=>{

let d=document.createElement("div")
d.className="tile"
d.innerText=l

d.onclick=()=>select(i,d)

g.appendChild(d)

})

}

function select(i,el){

if(selected.length>=4)return

el.classList.add("selected")
selected.push({i,el})

}

function checkWord(){

if(selected.length!==4) return

let word=selected.map(x=>grid[x.i]).join("")

if(WORDS.includes(word)){

foundWords.push(word)

selected.forEach(s=>{
s.el.classList.add("hidden")
grid[s.i]=""
})

if(mode==="endless"){

let newWord=randomWord()

for(let i=0;i<4;i++){

grid.push(newWord[i])

}

grid=grid.filter(x=>x!="")

shuffle(grid)

drawGrid()

}else{

grid=grid.filter(x=>x!="")

drawGrid()

if(grid.length===0){

win()

}

}

}

selected.forEach(s=>s.el.classList.remove("selected"))

selected=[]

}

function win(){

clearInterval(timerInterval)

document.getElementById("game").style.display="none"
document.getElementById("win").style.display="block"

let time=Math.floor((Date.now()-startTime)/1000)

document.getElementById("finalTime").innerText=time+"s"

let hs=localStorage.getItem("wort_highscore")

if(!hs||time<hs){

localStorage.setItem("wort_highscore",time)
hs=time

}

document.getElementById("highscore").innerText=hs+"s"

let ul=document.getElementById("words")

foundWords.forEach(w=>{
let li=document.createElement("li")
li.innerText=w
ul.appendChild(li)
})

}

function endEndless(){

win()

}

</script>

</body>
</html>
