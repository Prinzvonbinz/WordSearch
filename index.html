<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wortsuche 4x4</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px;
  }
  h1 {
    margin-bottom: 10px;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 70px);
    grid-gap: 8px;
    margin-top: 20px;
  }
  .cell {
    width: 70px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    background-color: #222;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    transition: background-color 0.2s;
  }
  .cell.selected {
    background-color: #ffcc00;
    color: #000;
  }
  #winPanel {
    display: none;
    margin-top: 30px;
    text-align: center;
  }
  button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background-color: #ffcc00;
    color: #000;
  }
</style>
</head>
<body>
<h1>Wortsuche 4x4</h1>
<p>Finde die 4 Wörter!</p>
<div id="grid"></div>

<div id="winPanel">
  <h2>Gewonnen!</h2>
  <p id="stats"></p>
  <p id="foundWords"></p>
  <button onclick="startGame()">Neustarten</button>
</div>

<script>
const wordDatabase = ["HAUS", "HUND", "MAUS", "TIER", "BAUM", "AUTO", "GELD", "BROT"];
let grid = [];
let selected = [];
let foundWords = [];
let startTime;
let highscore = null;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startGame() {
  // reset
  selected = [];
  foundWords = [];
  document.getElementById('winPanel').style.display = 'none';
  
  // 4 zufällige Wörter wählen
  const words = shuffle(wordDatabase).slice(0, 4);
  foundWords.wordsToFind = words; // speichern
  const letters = words.join('').split('');
  grid = shuffle(letters);
  
  startTime = Date.now();
  renderGrid();
}

function renderGrid() {
  const gridDiv = document.getElementById('grid');
  gridDiv.innerHTML = '';
  grid.forEach((letter, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.textContent = letter;
    if (selected.includes(i)) cell.classList.add('selected');
    cell.onclick = () => selectLetter(i);
    gridDiv.appendChild(cell);
  });
}

function selectLetter(index) {
  if (selected.includes(index)) {
    selected = selected.filter(i => i !== index);
  } else {
    selected.push(index);
  }
  renderGrid();
  if (selected.length === 4) checkWord();
}

function checkWord() {
  const word = selected.map(i => grid[i]).join('');
  if (foundWords.wordsToFind.includes(word) && !foundWords.includes(word)) {
    foundWords.push(word);
    selected.forEach(i => grid[i] = ''); // verschwinden lassen
    selected = [];
    renderGrid();
    checkWin();
  } else {
    alert("Falsches Wort!");
    selected = [];
    renderGrid();
  }
}

function checkWin() {
  if (foundWords.length === 4) {
    const timeTaken = Math.floor((Date.now() - startTime) / 1000);
    if (highscore === null || timeTaken < highscore) highscore = timeTaken;
    document.getElementById('stats').textContent = `Zeit: ${timeTaken} Sekunden | Highscore: ${highscore} Sekunden`;
    document.getElementById('foundWords').textContent = `Gefundene Wörter: ${foundWords.join(', ')}`;
    document.getElementById('winPanel').style.display = 'block';
  }
}

// Spiel sofort starten
startGame();
</script>
</body>
</html>
