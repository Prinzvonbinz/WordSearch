<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wortspiel</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:#0f172a;
color:white;
}

.card{
width:360px;
height:620px;
background:#1e293b;
border-radius:25px;
padding:20px;
box-sizing:border-box;
display:flex;
flex-direction:column;
align-items:center;
}

h1{
margin:10px 0 20px 0;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
width:100%;
margin-top:20px;
}

.tile{

aspect-ratio:1/1;

background:#334155;
border-radius:12px;

display:flex;
justify-content:center;
align-items:center;

font-size:30px;
font-weight:bold;

cursor:pointer;
}

.tile.selected{
background:#3b82f6;
}

button{

margin-top:20px;
padding:12px 20px;

border:none;
border-radius:10px;

font-size:16px;

background:#3b82f6;
color:white;

cursor:pointer;

}

#menu{
display:flex;
flex-direction:column;
align-items:center;
}

#game{
display:none;
flex-direction:column;
align-items:center;
width:100%;
}

#win{
display:none;
flex-direction:column;
align-items:center;
}

</style>
</head>

<body>

<div class="card">

<div id="menu">

<h1>Wortspiel</h1>

<button onclick="startGame()">Start</button>

</div>

<div id="game">

<div>Zeit: <span id="time">0</span>s</div>

<div id="grid" class="grid"></div>

<button onclick="checkWord()">Wort prüfen</button>

</div>

<div id="win">

<h2>Gewonnen</h2>

<p>Zeit: <span id="final"></span></p>

<button onclick="location.reload()">Nochmal</button>

</div>

</div>

<script>

const WORDS=[
"HAUS",
"MAUS",
"BAUM",
"AUTO",
"MOND",
"WIND",
"HAND",
"KIND"
]

let grid=[]
let selected=[]
let found=[]
let start
let timer

function startGame(){

document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="flex"

start=Date.now()

timer=setInterval(()=>{
document.getElementById("time").innerText=
Math.floor((Date.now()-start)/1000)
},1000)

generateGrid()
drawGrid()

}

function generateGrid(){

let words=[]

while(words.length<4){

let w=WORDS[Math.floor(Math.random()*WORDS.length)]

if(!words.includes(w)) words.push(w)

}

grid=[]

words.forEach(w=>{
grid.push(...w.split(""))
})

shuffle(grid)

}

function shuffle(a){

for(let i=a.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))
[a[i],a[j]]=[a[j],a[i]]

}

}

function drawGrid(){

const g=document.getElementById("grid")

g.innerHTML=""

grid.forEach((l,i)=>{

const d=document.createElement("div")

d.className="tile"
d.innerText=l

d.onclick=()=>select(i,d)

g.appendChild(d)

})

}

function select(i,el){

if(selected.length>=4) return

el.classList.add("selected")

selected.push({i,el})

}

function checkWord(){

if(selected.length!==4) return

let word=selected.map(x=>grid[x.i]).join("")

if(WORDS.includes(word)){

found.push(word)

selected.forEach(s=>{
s.el.style.visibility="hidden"
})

}

selected.forEach(s=>{
s.el.classList.remove("selected")
})

selected=[]

if(found.length===4){

win()

}

}

function win(){

clearInterval(timer)

document.getElementById("game").style.display="none"
document.getElementById("win").style.display="flex"

document.getElementById("final").innerText=
Math.floor((Date.now()-start)/1000)+"s"

}

</script>

</body>
</html>
